<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="guedes.jpg" type="image/x-icon">
  <title>Guede's Restaurante e Pizzaria</title>
  <meta name="description" content="Pizzaria e restaurante em Periperi, Salvador. Pizza artesanal, almoço caseiro e chopp gelado." />

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- React e Babel via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- Ponto de montagem do React -->
  <div id="root"></div>

  <!-- Dados do site (cardápio, horários, avaliações) -->
  <script src="js/data.js"></script>

  <!-- Componentes React (JSX transpilado pelo Babel no browser) -->
  <script type="text/babel" src="js/app.js"></script>

</body>
</html>
